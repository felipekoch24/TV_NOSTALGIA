<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sessão Nostalgia</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }
        #btn-start { 
            padding: 40px 80px; 
            font-size: 2rem; 
            cursor: pointer; 
            background: #8b4513; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            transition: 0.3s; 
            z-index: 10;
        }
        #btn-start:hover, #btn-start:focus { 
            background: #a0522d; 
            outline: 5px solid yellow; 
            transform: scale(1.05); 
        }
        #player { 
            width: 100vw; 
            height: 100vh; 
            display: none; 
        }
    </style>
</head>
<body>

    <button id="btn-start">Clique aqui para começar sua SESSÃO NOSTALGIA</button>
    <video id="player" playsinline controls></video>

    <script>
        const video = document.getElementById('player');
        const btn = document.getElementById('btn-start');
        let hls = null;

        // Lista das séries com seus dados
        const series = [
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/a/a-pantera-cor-de-rosa/", total: 129 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/a/a-turma-do-manda-chuva-dublado/", total: 30 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/c/capitao-planeta-dublado/", total: 65 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/a/as-aventuras-de-jackie-chan-dublado/", total: 95 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/c/cavalo-de-fogo-dublado/", total: 13 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/c/chaotic-dublado/", total: 66 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/d/dennis-o-pimentinha-dublado/", total: 13 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/d/dick-vigarista-e-muttley-dublado/", total: 34 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/c/corrida-maluca-dublado/", total: 34 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/g/gormiti-dublado/", total: 52 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-1-temporada-dublado/", total: 20 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-2-temporada-dublado/", total: 20 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-3-temporada-dublado/", total: 20 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-4-temporada-dublado/", total: 20 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-5-temporada-dublado/", total: 20 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-6-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-7-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-8-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-9-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-10-temporada-dublado/", total: 11 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-11-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/b/bob-esponja-12-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/a/as-aventuras-de-tintim-dublado/", total: 39 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/s/superman-a-serie-animada-dublado/", total: 54 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/u/ultimate-homem-aranha-1-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/u/ultimate-homem-aranha-2-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/u/ultimate-homem-aranha-3-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/u/ultimate-homem-aranha-4-temporada-dublado/", total: 26 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/animes/power-rangers-spd-dublado/", total: 38 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/tokusatsus/p/power-rangers-samurai-dublado/", total: 20 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/d/duck-dodgers-1-temporada-dublado/", total: 13 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/d/duck-dodgers-2-temporada-dublado/", total: 13 },
            { base: "https://cdn-s01.mywallpaper-4k-image.net/stream/d/duck-dodgers-3-temporada-dublado/", total: 13 }
        ];

        let masterPlaylist = [];
        let estadoAtual = 'inicio'; // Ordem fixa: inicio → desenho → propaganda → repete

        // Monta lista de episódios
        series.forEach(s => {
            for (let i = 1; i <= s.total; i++) {
                let num = i.toString().padStart(2, '0');
                masterPlaylist.push(`${s.base}${num}.mp4/index.m3u8`);
            }
        });

        // Função para carregar vídeo com tratamento de erro
        function reproduzirFonte(fonte) {
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(fonte);
                hls.attachMedia(video);
                // Se der erro, pula automaticamente
                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal) {
                        hls.destroy();
                        proximoConteudo();
                    }
                });
                video.play().catch(() => {});
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = fonte;
                video.play().catch(() => proximoConteudo());
            }
        }

        // 🎯 Ordem de reprodução garantida
        function proximoConteudo() {
            switch(estadoAtual) {
                case 'inicio':
                    // PRIMEIRO DE TUDO: playlist.m3u8
                    reproduzirFonte("playlist.m3u8");
                    estadoAtual = 'desenho';
                    break;

                case 'desenho':
                    // Depois: desenho aleatório
                    const aleatorio = masterPlaylist[Math.floor(Math.random() * masterPlaylist.length)];
                    reproduzirFonte(aleatorio);
                    estadoAtual = 'propaganda';
                    break;

                case 'propaganda':
                    // Depois: index.m3u8
                    reproduzirFonte("index.m3u8");
                    estadoAtual = 'desenho';
                    break;
            }
        }

        // Voltar conteúdo
        function conteudoAnterior() {
            switch(estadoAtual) {
                case 'desenho':
                    reproduzirFonte("playlist.m3u8");
                    estadoAtual = 'inicio';
                    break;
                case 'propaganda':
                    const aleatorio = masterPlaylist[Math.floor(Math.random() * masterPlaylist.length)];
                    reproduzirFonte(aleatorio);
                    estadoAtual = 'desenho';
                    break;
                case 'inicio':
                    reproduzirFonte("index.m3u8");
                    estadoAtual = 'propaganda';
                    break;
            }
        }

        // Ao clicar no botão, começa a sequência
        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            video.style.display = 'block';
            if (video.requestFullscreen) video.requestFullscreen();
            proximoConteudo(); // Começa direto pelo playlist.m3u8
        });

        // Quando terminar um vídeo, segue a ordem
        video.addEventListener('ended', proximoConteudo);

        // Controles: só setas esquerda/direita + play/pause
        document.addEventListener('keydown', (e) => {
            if (btn.style.display === 'none') {
                e.preventDefault();
                if (e.keyCode === 37) conteudoAnterior();   // ← Voltar
                if (e.keyCode === 39) proximoConteudo();     // → Avançar
                if (e.keyCode === 13 || e.keyCode === 66) { // Enter / B = play/pause
                    video.paused ? video.play() : video.pause();
                }
            } else {
                if (e.keyCode === 13 || e.keyCode === 66) btn.click();
            }
        });

        window.addEventListener('load', () => btn.focus());
    </script>
</body>
</html>
