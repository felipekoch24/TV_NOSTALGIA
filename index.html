<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sessão Nostalgia</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }
        #btn-start { 
            padding: 40px 80px; 
            font-size: 2rem; 
            cursor: pointer; 
            background: #8b4513; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            transition: 0.3s; 
            z-index: 10;
        }
        #btn-start:hover, #btn-start:focus { 
            background: #a0522d; 
            outline: 5px solid yellow; 
            transform: scale(1.05); 
        }
        #player { 
            width: 100vw; 
            height: 100vh; 
            display: none; 
        }
        /* Classe para ocultar controles */
        .controles-ocultos::-webkit-media-controls {
            display: none !important;
        }
        .controles-ocultos {
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <button id="btn-start">Clique aqui para começar sua SESSÃO NOSTALGIA</button>
    <video id="player" playsinline controls></video>

    <script>
        const video = document.getElementById('player');
        const btn = document.getElementById('btn-start');
        let hls = null;

        // Lista de séries e episódios REMOVIDA
        let masterPlaylist = [];
        let estado = 0; // 0 = playlist, 1 = desenho, 2 = index

        function reproduzirFonte(fonte) {
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(fonte);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal) {
                        hls.destroy();
                        proximoConteudo();
                    }
                });
                video.play().catch(() => {});
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = fonte;
                video.play().catch(() => proximoConteudo());
            }
        }

        function proximoConteudo() {
            switch(estado) {
                case 0:
                    reproduzirFonte("playlist.m3u8");
                    estado = 1;
                    break;
                case 1:
                    // Conteúdo aleatório REMOVIDO
                    reproduzirFonte("index.m3u8");
                    estado = 2;
                    break;
                case 2:
                    reproduzirFonte("index.m3u8");
                    estado = 1;
                    break;
            }
        }

        function conteudoAnterior() {
            switch(estado) {
                case 0:
                    estado = 2;
                    reproduzirFonte("index.m3u8");
                    break;
                case 1:
                    estado = 0;
                    reproduzirFonte("playlist.m3u8");
                    break;
                case 2:
                    estado = 1;
                    reproduzirFonte("index.m3u8");
                    break;
            }
        }

        // Ocultar barra de progresso/controles
        function ocultarControles() {
            video.classList.add("controles-ocultos");
        }

        // Mostrar barra de progresso/controles
        function mostrarControles() {
            video.classList.remove("controles-ocultos");
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            video.style.display = 'block';
            if (video.requestFullscreen) video.requestFullscreen();
            proximoConteudo();
        });

        video.addEventListener('ended', proximoConteudo);

        // Teclas adicionadas para Fire Stick
        document.addEventListener('keydown', (e) => {
            if (btn.style.display === 'none') {
                e.preventDefault();
                if (e.keyCode === 37) conteudoAnterior();   // ← Voltar
                if (e.keyCode === 39) proximoConteudo();     // → Avançar
                if (e.keyCode === 40) ocultarControles();    // ↓ Ocultar controles
                if (e.keyCode === 38) mostrarControles();    // ↑ Mostrar controles
                if (e.keyCode === 13 || e.keyCode === 66) { // Enter / B = pausar/retomar
                    video.paused ? video.play() : video.pause();
                }
            } else {
                if (e.keyCode === 13 || e.keyCode === 66) btn.click();
            }
        });

        window.addEventListener('load', () => btn.focus());
    </script>
</body>
</html>
