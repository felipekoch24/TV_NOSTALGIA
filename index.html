<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sessão Nostalgia</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }
        #btn-start { 
            padding: 40px 80px; 
            font-size: 2rem; 
            cursor: pointer; 
            background: #8b4513; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            transition: 0.3s; 
            z-index: 10;
        }
        #btn-start:hover, #btn-start:focus { 
            background: #a0522d; 
            outline: 5px solid yellow; 
            transform: scale(1.05); 
        }
        #player { 
            width: 100vw; 
            height: 100vh; 
            display: none; 
        }
        .controles-ocultos::-webkit-media-controls {
            display: none !important;
        }
        .controles-ocultos {
            -webkit-appearance: none;
        }
    </style>
</head>
<body>

    <button id="btn-start">Clique aqui para começar sua SESSÃO NOSTALGIA</button>
    <video id="player" playsinline controls></video>

    <script>
        const video = document.getElementById('player');
        const btn = document.getElementById('btn-start');
        let hls = null;
        let estado = 0; // 0 = Anúncio, 1 = Pica-Pau

        // ✅ LINKS PRONTOS E CORRETOS
        const ANUNCIO = "https://raw.githubusercontent.com/felipekoch24/TV_NOSTALGIA/main/playlist.m3u8";
        const PICA_PAU = "https://raw.githubusercontent.com/felipekoch24/TV_NOSTALGIA/main/pica-pau/index.m3u8";

        function reproduzirFonte(fonte) {
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(fonte);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal) {
                        console.error("Erro ao carregar:", data);
                        hls.destroy();
                        proximoConteudo();
                    }
                });
                video.play().catch(() => {});
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = fonte;
                video.play().catch(() => proximoConteudo());
            }
        }

        function proximoConteudo() {
            if (estado === 0) {
                // Terminou o anúncio → vai para o Pica-Pau
                reproduzirFonte(PICA_PAU);
                estado = 1;
            } else {
                // Terminou o Pica-Pau → volta para o anúncio
                reproduzirFonte(ANUNCIO);
                estado = 0;
            }
        }

        function conteudoAnterior() {
            if (estado === 1) {
                reproduzirFonte(ANUNCIO);
                estado = 0;
            } else {
                reproduzirFonte(PICA_PAU);
                estado = 1;
            }
        }

        function ocultarControles() {
            video.classList.add("controles-ocultos");
        }

        function mostrarControles() {
            video.classList.remove("controles-ocultos");
        }

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            video.style.display = 'block';
            if (video.requestFullscreen) video.requestFullscreen();
            estado = 0;
            reproduzirFonte(ANUNCIO);
        });

        // Troca automaticamente quando o vídeo acabar
        video.addEventListener('ended', proximoConteudo);

        // Controles para Fire Stick / Controle Remoto
        document.addEventListener('keydown', (e) => {
            if (btn.style.display === 'none') {
                e.preventDefault();
                if (e.keyCode === 37) conteudoAnterior();   // ← Voltar
                if (e.keyCode === 39) proximoConteudo();     // → Avançar
                if (e.keyCode === 40) ocultarControles();    // ↓ Ocultar controles
                if (e.keyCode === 38) mostrarControles();    // ↑ Mostrar controles
                if (e.keyCode === 13 || e.keyCode === 66) { // Enter / Botão B = Pausar/Retomar
                    video.paused ? video.play() : video.pause();
                }
            } else {
                if (e.keyCode === 13 || e.keyCode === 66) btn.click();
            }
        });

        window.addEventListener('load', () => btn.focus());
    </script>
</body>
</html>
